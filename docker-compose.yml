version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: blotquant-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: blotquant-api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=blotquant
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
    volumes:
      - ./data/uploads:/app/data/uploads
    depends_on:
      - mongodb
    command: uvicorn server:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    container_name: blotquant-ui
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
