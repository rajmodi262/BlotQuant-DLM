version: '3.8'

services:
  backend:
    build: ./backend
    container_name: blotquant-api
    ports:
      - "8001:8001"
    environment:
      - CORS_ORIGINS=http://localhost:5174
    volumes:
      - ./data:/app/data
      - ./ml_pipeline:/app/ml_pipeline
    command: uvicorn server:app --host 0.0.0.0 --port 8001

  frontend:
    build: ./frontend
    container_name: blotquant-ui
    ports:
      - "5174:80"
    depends_on:
      - backend
